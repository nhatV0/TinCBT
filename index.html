<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống học tập - THPT Chuyên Bến Tre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- MathJax để hiển thị công thức Toán học chuyên nghiệp -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Nạp cấu trúc dữ liệu chính -->
    <script src="data.js"></script>
    
    <style>
        body { 
            background-color: #f8fafc; 
            font-family: "Comic Sans MS", "Comic Sans", cursive, sans-serif; 
            scroll-behavior: smooth;
        }
        .lesson-active { 
            background-color: #eff6ff; 
            color: #2563eb; 
            border-right: 6px solid #2563eb; 
            font-weight: bold; 
        }
        .video-container { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            overflow: hidden; 
            border-radius: 24px; 
            background: #000; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 4px solid white;
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .hidden { display: none; }
        
        /* Hiệu ứng cho các thẻ bài học ở Dashboard */
        .course-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-radius: 24px; position: relative; }
        .course-card:hover { transform: translateY(-5px); }
        .course-desc { 
            position: absolute; bottom: 110%; left: 0; right: 0; 
            background: #1e293b; color: white; padding: 1.25rem; 
            border-radius: 1rem; font-size: 0.85rem; opacity: 0; 
            transform: translateY(10px); transition: all 0.3s ease;
            pointer-events: none; z-index: 50; 
        }
        .course-card:hover .course-desc { opacity: 1; transform: translateY(0); }
        
        footer { background: linear-gradient(to right, #0f172a, #1e293b); color: white; }

        /* Tùy chỉnh hiển thị Code */
        pre {
            scrollbar-width: thin;
            scrollbar-color: #475569 transparent;
        }
        
        /* Loại bỏ dấu mũi tên mặc định của details */
        details summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-slate-800">

    <!-- Loading Overlay -->
    <div id="loader" class="fixed inset-0 bg-white/95 flex items-center justify-center z-[100] hidden">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-600"></div>
            <span class="text-lg font-bold text-blue-600 uppercase tracking-tighter animate-pulse">Đang tải học liệu...</span>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="h-20 bg-white border-b flex items-center justify-between px-8 shrink-0 z-20 shadow-sm">
        <div class="flex items-center gap-4 cursor-pointer" onclick="showDashboard()">
            <img src="BenTreHighSchool.jpg" alt="Logo" class="h-12 w-auto" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2830/2830312.png'">
            <div class="flex flex-col">
                <span class="font-black text-xl md:text-2xl uppercase text-slate-900 leading-none">THPT CHUYÊN</span>
                <span class="font-bold text-blue-600 text-lg leading-none italic">BẾN TRE</span>
            </div>
        </div>
        <div id="nav-info" class="hidden md:flex items-center gap-4">
            <button onclick="showDashboard()" class="px-6 py-2 bg-blue-600 text-white rounded-full font-bold shadow-md hover:bg-blue-700 transition-all flex items-center gap-2">
                <i data-lucide="home" class="w-4 h-4"></i> Trang chủ
            </button>
        </div>
    </nav>

    <!-- Dashboard Screen -->
    <div id="dashboard" class="flex-1 overflow-y-auto">
        <div class="max-w-7xl mx-auto p-8 md:p-16">
            <header class="mb-20 text-center">
                <h1 class="text-7xl md:text-9xl font-black text-slate-900 mb-4 tracking-tighter italic drop-shadow-md">TIN HỌC</h1>
                <div class="inline-flex items-center gap-3 px-8 py-3 bg-slate-900 text-white rounded-full text-xs font-bold uppercase tracking-[0.2em] shadow-2xl">
                    <span class="w-2 h-2 bg-green-400 rounded-full animate-ping"></span>
                    Hệ thống học liệu số 4.0
                </div>
            </header>
            
            <div id="dashboard-content" class="space-y-20"></div>
        </div>

        <footer class="mt-20 py-16 px-8 border-t border-slate-200">
            <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                <div class="flex items-center gap-6">
                    <img id="t-avatar" src="" class="w-24 h-24 rounded-full border-4 border-white shadow-2xl bg-slate-100 object-cover" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1995/1995515.png'">
                    <div>
                        <h3 id="t-name" class="text-2xl font-black mb-1 italic text-white tracking-tight"></h3>
                        <p id="t-role" class="text-slate-400 font-bold text-xs uppercase tracking-widest mb-4"></p>
                        <div class="flex gap-4">
                            <a id="t-fb" href="#" target="_blank" class="p-2.5 bg-blue-600 hover:bg-blue-500 rounded-xl transition-all"><i data-lucide="facebook" class="w-5 h-5"></i></a>
                            <a id="t-zalo" href="#" target="_blank" class="p-2.5 bg-sky-500 hover:bg-sky-400 rounded-xl transition-all"><i data-lucide="phone" class="w-5 h-5"></i></a>
                            <a id="t-mail" href="#" class="p-2.5 bg-rose-500 hover:bg-rose-400 rounded-xl transition-all"><i data-lucide="mail" class="w-5 h-5"></i></a>
                        </div>
                    </div>
                </div>
                <div class="text-right text-slate-400 text-sm">
                    <p class="font-bold mb-1 italic">Trường THPT Chuyên Bến Tre</p>
                    <p class="text-xs uppercase tracking-tighter">Sáng tạo - Kỷ nguyên số - Thành công</p>
                </div>
            </div>
        </footer>
    </div>

    <!-- Learning Screen -->
    <div id="learning-screen" class="hidden flex flex-1 overflow-hidden">
        <aside class="w-full md:w-80 lg:w-96 bg-white border-r flex flex-col shrink-0 z-10 shadow-2xl">
            <div class="p-6 border-b bg-slate-50 flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-1">Đang học</p>
                    <h2 id="sidebar-course-title" class="font-bold text-slate-800 text-sm uppercase truncate max-w-[200px]"></h2>
                </div>
                <button onclick="showDashboard()" class="p-2 hover:bg-red-50 text-slate-400 hover:text-red-500 rounded-full transition-colors">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="overflow-y-auto flex-1 scrollbar-hide" id="playlist-container"></div>
            
            <div class="p-4 bg-slate-50 border-t flex items-center gap-3">
                <img id="t-avatar-small" src="" class="w-10 h-10 rounded-full border-2 border-white shadow-md object-cover" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1995/1995515.png'">
                <div class="text-[11px]">
                    <p class="font-black text-slate-800 uppercase leading-none mb-1" id="t-name-small"></p>
                    <p class="text-slate-500 font-bold" id="t-mail-small"></p>
                </div>
            </div>
        </aside>
        
        <main class="flex-1 overflow-y-auto bg-[#f1f5f9] p-4 md:p-10">
            <div class="max-w-5xl mx-auto pb-20">
                <div class="video-container mb-10">
                    <iframe id="main-video" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
                
                <div class="bg-white rounded-[32px] p-8 md:p-12 shadow-sm border border-slate-200">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8 pb-8 border-b border-slate-100">
                        <h1 id="current-lesson-title" class="text-3xl font-black text-slate-900 tracking-tight leading-tight"></h1>
                        <div id="download-zone"></div>
                    </div>
                    
                    <div id="current-lesson-desc" class="text-slate-700 text-lg leading-relaxed"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let activeCourse = null;

        function syncUI() {
            if(window.teacherInfo) {
                const t = window.teacherInfo;
                document.getElementById('t-name').innerText = t.name;
                document.getElementById('t-role').innerText = t.role;
                document.getElementById('t-fb').href = t.facebook;
                document.getElementById('t-zalo').href = t.zalo;
                document.getElementById('t-mail').href = `mailto:${t.email}`;
                document.getElementById('t-avatar').src = t.avatar;
                document.getElementById('t-name-small').innerText = "GV. " + t.name;
                document.getElementById('t-mail-small').innerText = t.email;
                document.getElementById('t-avatar-small').src = t.avatar;
            }

            const container = document.getElementById('dashboard-content');
            if(!window.courses) return;
            
            const sections = [
                { label: 'Chương trình Chính khóa', key: 'chinhKhoa', color: 'blue', icon: 'book-open' },
                { label: 'Lớp Chuyên Tin', key: 'chuyenTin', color: 'purple', icon: 'code-2' },
                { label: 'Chuyên đề tự chọn', key: 'chuyenDe', color: 'emerald', icon: 'layers' },
                { label: 'Khác', key: 'khac', color: 'amber', icon: 'more-horizontal' }
            ];

            container.innerHTML = sections.map(sec => {
                const list = window.courses[sec.key];
                if (!list || list.length === 0) return '';
                return `
                <section>
                    <div class="flex items-center gap-4 mb-8">
                        <div class="p-3 bg-${sec.color}-600 text-white rounded-2xl shadow-lg shadow-${sec.color}-200">
                            <i data-lucide="${sec.icon}"></i>
                        </div>
                        <h2 class="text-2xl font-black uppercase text-slate-800 tracking-tighter italic">${sec.label}</h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${list.map(course => `
                            <div onclick="selectCourse('${course.id}')" class="course-card bg-white p-8 border border-slate-200 hover:border-${sec.color}-400 hover:shadow-2xl cursor-pointer group">
                                <div class="course-desc font-bold">${course.description || 'Học liệu điện tử môn Tin học.'}</div>
                                <div class="w-14 h-14 rounded-2xl bg-${sec.color}-50 text-${sec.color}-600 flex items-center justify-center mb-6 group-hover:bg-${sec.color}-600 group-hover:text-white transition-all shadow-inner">
                                    <i data-lucide="${course.icon || 'star'}" class="w-7 h-7"></i>
                                </div>
                                <h3 class="font-black text-xl text-slate-900 mb-2 leading-tight">${course.title}</h3>
                                <div class="flex items-center gap-2 text-${sec.color}-600 font-bold text-[10px] uppercase tracking-widest">
                                    <span>Vào học ngay</span> <i data-lucide="arrow-right" class="w-4 h-4"></i>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>`;
            }).join('');
            lucide.createIcons();
        }

        async function selectCourse(courseId) {
            let found = null;
            Object.values(window.courses).forEach(group => {
                const c = group.find(item => item.id === courseId);
                if(c) found = c;
            });
            if (!found) return;

            document.getElementById('loader').classList.remove('hidden');
            const oldScript = document.getElementById('course-data-script');
            if(oldScript) oldScript.remove();
            window.courseContent = null;

            const script = document.createElement('script');
            script.id = 'course-data-script';
            script.src = found.dataPath + '?v=' + Date.now();
            document.head.appendChild(script);

            script.onload = () => {
                document.getElementById('loader').classList.add('hidden');
                if (window.courseContent) {
                    activeCourse = { ...found, content: window.courseContent };
                    document.getElementById('dashboard').classList.add('hidden');
                    document.getElementById('learning-screen').classList.remove('hidden');
                    document.getElementById('nav-info').classList.remove('hidden');
                    document.getElementById('sidebar-course-title').innerText = activeCourse.title;
                    renderPlaylist();
                    playLesson(0, 0);
                }
            };
            script.onerror = () => {
                document.getElementById('loader').classList.add('hidden');
                alert("Lỗi tải dữ liệu khóa học.");
            };
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist-container');
            let html = '';
            activeCourse.content.forEach((chapter, cIndex) => {
                html += `<div class="px-6 py-4 bg-slate-100 border-y text-[10px] font-black text-slate-500 uppercase italic tracking-widest">${chapter.chapterName}</div>`;
                chapter.lessons.forEach((lesson, lIndex) => {
                    html += `
                        <div onclick="playLesson(${cIndex}, ${lIndex})" id="l-${cIndex}-${lIndex}" class="flex items-center gap-4 px-6 py-5 cursor-pointer hover:bg-blue-50 border-b text-sm lesson-item transition-all group">
                            <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-[10px] font-black group-hover:bg-blue-600 group-hover:text-white transition-all">
                                ${lIndex + 1}
                            </div>
                            <span class="flex-1 font-bold text-slate-700">${lesson.title}</span>
                        </div>`;
                });
            });
            container.innerHTML = html;
        }

        function playLesson(cIndex, lIndex) {
            const lesson = activeCourse.content[cIndex].lessons[lIndex];
            const videoFrame = document.getElementById('main-video');
            
            videoFrame.src = lesson.videoId ? `https://www.youtube.com/embed/${lesson.videoId}?autoplay=1&rel=0` : "";
            videoFrame.parentElement.style.display = lesson.videoId ? "block" : "none";
            
            document.getElementById('current-lesson-title').innerText = lesson.title;
            
            let contentHtml = `<p class="mb-6 font-bold text-slate-600 italic border-l-4 border-slate-200 pl-4">${lesson.desc || ''}</p>`;
            
            // Ưu tiên hiển thị contentHtml (Cấu trúc có nút ẩn hiện của Thầy)
            if (lesson.contentHtml) {
                contentHtml += lesson.contentHtml;
            } else if (lesson.activities) {
                // Dự phòng nếu dùng cấu trúc activities cũ
                lesson.activities.forEach(act => {
                    contentHtml += `
                        <div class="bg-blue-50 border-l-8 border-blue-500 p-6 rounded-r-2xl shadow-sm mb-4">
                            <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">${act.type}</span>
                            <div class="text-slate-800 font-bold text-lg">${act.content}</div>
                        </div>`;
                });
            }
            
            document.getElementById('current-lesson-desc').innerHTML = contentHtml;
            
            const dz = document.getElementById('download-zone');
            dz.innerHTML = (lesson.downloadUrl && lesson.downloadUrl !== "#") ? 
                `<a href="${lesson.downloadUrl}" target="_blank" class="bg-slate-900 text-white px-6 py-3 rounded-full text-xs font-black flex items-center gap-2 hover:bg-blue-600 transition-all shadow-lg active:scale-95">
                    <i data-lucide="download-cloud" class="w-4 h-4"></i> TẢI TÀI LIỆU
                </a>` : '';

            document.querySelectorAll('.lesson-item').forEach(el => el.classList.remove('lesson-active'));
            const activeEl = document.getElementById(`l-${cIndex}-${lIndex}`);
            if(activeEl) activeEl.classList.add('lesson-active');
            
            // Kích hoạt icon Lucide trong nội dung mới nạp
            lucide.createIcons();
            
            // Yêu cầu MathJax vẽ lại công thức toán học
            if (window.MathJax && window.MathJax.typeset) {
                window.MathJax.typeset();
            }
        }

        function showDashboard() {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('learning-screen').classList.add('hidden');
            document.getElementById('nav-info').classList.add('hidden');
            document.getElementById('main-video').src = '';
            syncUI();
        }

        window.onload = syncUI;
    </script>
</body>
</html>
